services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: marpex
      POSTGRES_PASSWORD: marpex
      POSTGRES_DB: marpex_crm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marpex -d marpex_crm"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
